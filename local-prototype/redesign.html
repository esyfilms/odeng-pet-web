<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odeng Digi Pet Redesign Preview</title>
    <link rel="stylesheet" href="./redesign.css" />
  </head>
  <body>
    <main class="preview-shell" aria-label="Odeng Digi Pet redesign preview">
      <section class="pet-device" aria-label="Odeng Digi Pet device">
        <header class="device-header">
          <div>
            <span class="eyebrow">Odeng Digi Pet</span>
            <h1 id="view-title">Home</h1>
          </div>
          <button class="status-pill" type="button" id="status-pill">Calm</button>
        </header>

        <section class="playfield" id="playfield" aria-label="Odeng screen">
          <div class="vitals-strip" aria-label="Odeng vitals">
            <span>Food 68</span>
            <span>Sleep 60</span>
            <span>Love 72</span>
          </div>
          <div class="micro-message" id="micro-message">Tap a command below.</div>
          <div class="scene-effects" id="scene-effects" aria-hidden="true"></div>
          <img class="odeng-sprite" id="odeng-sprite" src="./assets/baby-normalized/babyodeng-walkforward_0002.png" alt="Baby Odeng" />
          <div class="floor-line"></div>
        </section>

        <section class="action-panel" id="action-panel" aria-label="Selected action panel">
          <p class="panel-kicker">Ready</p>
          <p class="panel-title">Choose a care command.</p>
        </section>

        <nav class="command-dock" aria-label="Odeng commands">
          <button type="button" class="command active" data-view="home">
            <span class="command-icon">●</span>
            <span>Home</span>
          </button>
          <button type="button" class="command" data-view="food">
            <span class="command-icon">◐</span>
            <span>Food</span>
          </button>
          <button type="button" class="command" data-view="play">
            <span class="command-icon">◇</span>
            <span>Play</span>
          </button>
          <button type="button" class="command" data-view="wash">
            <span class="command-icon">╂</span>
            <span>Wash</span>
          </button>
          <button type="button" class="command" data-view="heal">
            <span class="command-icon">＋</span>
            <span>Heal</span>
          </button>
          <button type="button" class="command" data-view="poop">
            <span class="command-icon">⌁</span>
            <span>Poop</span>
          </button>
          <button type="button" class="command" data-view="nap">
            <span class="command-icon">Z</span>
            <span>Nap</span>
          </button>
          <button type="button" class="command" data-view="tricks">
            <span class="command-icon">↯</span>
            <span>Tricks</span>
          </button>
        </nav>
      </section>
    </main>

    <script src="./redesign.js"></script>
  </body>
</html>
